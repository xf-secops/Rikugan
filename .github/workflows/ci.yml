name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "rikugan/**/*.py"
      - "tests/**/*.py"
      - ".github/workflows/ci.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Format check
        run: python -m ruff format --check rikugan/

      - name: Lint
        run: python -m ruff check rikugan/  # config in pyproject.toml

  typecheck:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install mypy tomli

      - name: Type check (core + providers)
        run: python -m mypy rikugan/core rikugan/providers  # config in pyproject.toml

  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install pytest tomli

      - name: Run tests
        run: python -m pytest tests/ --tb=short -q

  quality:
    name: Desloppify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install desloppify
        run: pip install desloppify

      - name: Run objective scan
        run: desloppify scan --profile objective --no-badge

      - name: Get changed Python files
        id: changed
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.py' > /tmp/changed_files.txt
          echo "Changed files:"
          cat /tmp/changed_files.txt

      - name: Gate on findings in changed files only
        run: |
          python -c "
          import json, subprocess, sys

          changed = [l.strip() for l in open('/tmp/changed_files.txt') if l.strip()]
          if not changed:
              print('No Python files changed — skipping quality gate')
              sys.exit(0)

          findings = []
          for f in changed:
              result = subprocess.run(
                  ['desloppify', 'show', f, '--output', '/tmp/file_findings.json', '--status', 'open'],
                  capture_output=True
              )
              try:
                  data = json.load(open('/tmp/file_findings.json'))
                  file_findings = data if isinstance(data, list) else data.get('findings', [])
                  findings.extend(file_findings)
              except (json.JSONDecodeError, FileNotFoundError):
                  pass

          if not findings:
              print(f'OK — no open findings in {len(changed)} changed file(s)')
              sys.exit(0)

          # Security findings in changed files are always a hard fail
          security = [f for f in findings if f.get('detector') == 'security']
          other    = [f for f in findings if f.get('detector') != 'security']

          for f in security:
              print(f\"SECURITY: {f.get('file')} — {f.get('message', f.get('id', '?'))}\")
          for f in other[:5]:  # show up to 5 non-security findings
              print(f\"  {f.get('detector')}: {f.get('file')} — {f.get('message', f.get('id', '?'))}\")

          if security:
              sys.exit(f'{len(security)} security finding(s) in your changed files — fix before merging')

          print(f'Advisory: {len(other)} non-security finding(s) in changed files (not blocking)')
          "

      - name: Post findings comment
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '';
            try {
              const changed = fs.readFileSync('/tmp/changed_files.txt', 'utf8').trim().split('\n').filter(Boolean);
              const data = JSON.parse(fs.readFileSync('.desloppify/query.json', 'utf8'));
              const score = data.objective_score;
              const emoji = score >= 95 ? '✅' : score >= 90 ? '⚠️' : '❌';
              body = `${emoji} **Desloppify** — objective score: **${score}/100**\n`;
              body += `Scanned ${changed.length} changed file(s). Run \`desloppify issues\` locally for the full findings list.`;
            } catch (e) {
              body = '⚠️ Desloppify could not produce a report.';
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
